<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMD BOT • Owner Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d15;
            color: #fff;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #particles-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #111722 0%, #05070c 100%);
        }
        .panel-container {
            position: relative;
            z-index: 1;
            background: rgba(10, 14, 23, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 100, 0.2);
            border-radius: 24px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 100, 0.15);
            max-width: 700px;
            width: 90%;
        }
        .glow-title {
            font-size: 2.8rem;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 20px #00ff66, 0 0 40px #00ff66, 0 0 80px #00ff6640;
            animation: pulse 2s infinite ease-in-out;
        }
        .subtitle {
            margin-top: 10px;
            font-size: 1rem;
            color: #8892b0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .status-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 25px 0 35px 0;
            gap: 12px;
        }
        .status-dot {
            width: 16px; height: 16px;
            background: #00ff66; border-radius: 50%;
            box-shadow: 0 0 20px #00ff66;
            animation: pulse-dot 1.5s infinite;
        }
        .status-text { font-size: 1.4rem; color: #00ff66; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0;
        }
        .stat-box {
            border: 1px solid rgba(255,255,255,0.05); padding: 15px;
            border-radius: 16px; background: rgba(255,255,255,0.02);
        }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #8892b0; margin-top: 6px; letter-spacing: 1px; }
        .footer-text { font-size: 0.75rem; color: #3a4155; margin-top: 20px; letter-spacing: 1px; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 15px #00ff66; }
            50% { opacity: 0.5; box-shadow: 0 0 30px #00ff66; }
        }
        @media (max-width: 600px) {
            .panel-container { padding: 25px; }
            .glow-title { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="panel-container">
        <h1 class="glow-title">FMD BOT</h1>
        <div class="subtitle">Owner Panel • Control Center</div>
        <div class="status-container">
            <div class="status-dot"></div>
            <div class="status-text">SYSTEM ONLINE</div>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="uptime">00:00:00</div>
                <div class="stat-label">UPTIME</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="servers">0</div>
                <div class="stat-label">SERVIDORES</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="commands">0</div>
                <div class="stat-label">COMANDOS</div>
            </div>
        </div>
        <div class="footer-text">Made by KING • FMD BOT BYPASS</div>
    </div>

    <script>
        // Partículas verdes estilo Matrix
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = Array.from({ length: 70 }, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5,
                color: `rgba(0, 255, 102, ${Math.random() * 0.5 + 0.1})`
            }));
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
                particles.forEach(p2 => {
                    const dx = p.x - p2.x, dy = p.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 255, 102, ${0.15 * (1 - dist/120)})`;
                        ctx.lineWidth = 0.5; ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();

        // Simular contadores animados
        let servers = 0, commands = 0;
        setInterval(() => {
            if (servers < 42) servers += Math.ceil(Math.random() * 3);
            if (commands < 128) commands += Math.ceil(Math.random() * 5);
            document.getElementById('servers').textContent = Math.min(servers, 42);
            document.getElementById('commands').textContent = Math.min(commands, 128);
        }, 800);

        // Reloj Uptime en vivo
        let start = Date.now();
        setInterval(() => {
            let diff = Math.floor((Date.now() - start) / 1000);
            let h = String(Math.floor(diff / 3600)).padStart(2, '0');
            let m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            let s = String(diff % 60).padStart(2, '0');
            document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
        }, 1000);
    </script>
</body>
</html>
